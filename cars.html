<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Saga Cars</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Cars</h1>
</header>

<main class="grid-container">
  <div class="car">
    <img src="images/charger.jpg" alt="Dodge Charger">
    <h2>Dodge Charger</h2>
    <p>Dom’s legendary muscle car.</p>
  </div>
  <div class="car">
    <img src="images/skyline.jpg" alt="Nissan Skyline">
    <h2>Nissan Skyline</h2>
    <p>Brian’s sleek import racer.</p>
  </div>
  <div class="car">
    <img src="images/supra.jpg" alt="Toyota Supra">
    <h2>Toyota Supra</h2>
    <p>The orange beauty that beat Dom’s Charger.</p>
  </div>
</main>
</body>
</html>
